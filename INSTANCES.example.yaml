# Managed OpenClaw Instances
# Updated by supervisor agent
#
# managed: true  — supervisor actively monitors and restarts if needed
# managed: false — supervisor knows about it but doesn't touch it

instances:
  - name: my-assistant
    profile: my-assistant
    port: 18801
    managed: true
    notes: "Day-to-day assistant"

  - name: my-worker
    profile: my-worker
    port: 18802
    managed: true
    notes: "Background task runner"

  - name: experimental
    profile: experimental
    port: 18803
    managed: false
    notes: "Not fully setup yet"
